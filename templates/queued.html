{% extends "layout.html" %}

{% block title %}キューに追加 — Lyric Video{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 text-success mb-3">✅ キューに追加されました</h1>
        <p class="text-muted small">Job ID</p>
        <div class="bg-light border rounded p-3 font-monospace mb-3 text-break">{{ job_id }}</div>
        <p class="text-muted small">処理が完了または失敗したとき、Slack に通知されます。</p>
        <div class="d-flex gap-3">
          <a href="/jobs/{{ job_id }}" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-eye me-1"></i>ジョブの詳細
          </a>
          <a href="/" class="btn btn-link btn-sm text-muted text-decoration-none">← 新しいジョブを作成</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
