<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キューに追加 — Lyric Video</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      padding: 36px 40px;
      width: 100%;
      max-width: 600px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 20px; color: #2f9e44; }
    .job-id {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 12px 16px;
      font-family: monospace;
      font-size: .95rem;
      margin: 16px 0;
      word-break: break-all;
    }
    p { font-size: .95rem; color: #555; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 24px;
      color: #5c7cfa;
      text-decoration: none;
      font-size: .9rem;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>✅ キューに追加されました</h1>
    <p>Job ID</p>
    <div class="job-id">{{ job_id }}</div>
    <p>処理が完了または失敗したとき、Slack に通知されます。</p>
    <a href="/">← 新しいジョブを作成</a>
  </div>
</body>
</html>
