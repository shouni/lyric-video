<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#76bc21">
  <title>{% block title %}Lyric Video{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
        crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>

{% block body %}
<nav class="navbar navbar-expand-lg mb-4 shadow-sm navbar-dark">
  <div class="container">
    <a class="navbar-brand text-white fw-bold" href="/">
      <i class="bi bi-film me-2"></i>Lyric Video
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-house-door me-1"></i>Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/new' %}active{% endif %}" href="/new">
            <i class="bi bi-plus-circle me-1"></i>新規作成
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path.startswith('/jobs') %}active{% endif %}" href="/jobs">
            <i class="bi bi-clock-history me-1"></i>履歴
          </a>
        </li>
      </ul>
      <span class="navbar-text">
        <a href="/auth/logout" class="text-white-50 small text-decoration-none">
          <i class="bi bi-box-arrow-right me-1"></i>ログアウト
        </a>
      </span>
    </div>
  </div>
</nav>

<div class="container main-content">
  {% block content %}{% endblock %}
</div>

<footer class="container text-center mt-5 mb-4 text-muted small">
  <hr class="mb-4 opacity-25">
  <div><i class="bi bi-film me-2"></i>&copy; 2026 <strong>Lyric Video</strong></div>
</footer>
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
