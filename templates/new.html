{% extends "layout.html" %}

{% block title %}新規作成 — Lyric Video{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <h2 class="mb-4"><i class="bi bi-film me-2"></i>新規作成</h2>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post" action="/new">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="mb-3">
            <label class="form-label fw-semibold">Audio GCS URL</label>
            <input type="text" class="form-control" name="audio_url"
                   placeholder="gs://bucket/path/to/audio.mp3" required>
            <div class="form-text">MP3 ファイルの GCS パス</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Keyframes ZIP GCS URL</label>
            <input type="text" class="form-control" name="keyframes_url"
                   placeholder="gs://bucket/path/to/keyframes.zip" required>
            <div class="form-text">PNG・inputs.txt・subtitles.ass を含む ZIP</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">
              Pre-aligned ASS GCS URL
              <span class="text-muted fw-normal">(省略可)</span>
            </label>
            <input type="text" class="form-control" name="subs_url" id="subs_url"
                   placeholder="gs://bucket/path/to/subtitles_aligned.ass">
            <div class="form-text">省略するとWhisperでタイミング自動生成</div>
          </div>

          <div class="mb-3" id="whisper_field">
            <label class="form-label fw-semibold">Whisper モデル</label>
            <select class="form-select" name="whisper_model">
              <option value="large-v3" {% if whisper_model == 'large-v3' %}selected{% endif %}>large-v3（高精度・低速）</option>
              <option value="medium"   {% if whisper_model == 'medium'   %}selected{% endif %}>medium</option>
              <option value="small"    {% if whisper_model == 'small'    %}selected{% endif %}>small</option>
              <option value="base"     {% if whisper_model == 'base'     %}selected{% endif %}>base（低精度・高速）</option>
            </select>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">実行キューに追加</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/index.js') }}" defer></script>
{% endblock %}
