substitutions:
  _ENV_PREFIX: 'develop'
  _REGION: 'asia-northeast1'
  _IMAGE_BASE: 'asia-northeast1-docker.pkg.dev'
  _REPO_PATH: 'ap-repo/lyric-video'
  _SERVICE_NAME: 'lyric-video'
  _TAG: '${_ENV_PREFIX}-${SHORT_SHA}'
  _CACHE_TAG: '${_ENV_PREFIX}-latest'
  _WHISPER_MODEL: 'large-v3'

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Pull Cache Image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull ${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG} || exit 0

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Container Image'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_TAG}'
      - '-t'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG}'
      - '--cache-from'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG}'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '--build-arg'
      - 'WHISPER_MODEL=${_WHISPER_MODEL}'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Image'
    args:
      - 'push'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_TAG}'

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy to Cloud Run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_TAG}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--execution-environment=gen2'
      - '--allow-unauthenticated'
      - '--timeout=1800'
      - '--memory=16Gi'
      - '--cpu=4'
      - '--concurrency=1'
      - '--update-env-vars'
      - 'GCP_PROJECT_ID=${PROJECT_ID},GCP_LOCATION_ID=${_REGION},WHISPER_MODEL=${_WHISPER_MODEL}'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Cache Image'
    args:
      - 'push'
      - '${_IMAGE_BASE}/${PROJECT_ID}/${_REPO_PATH}:${_CACHE_TAG}'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
